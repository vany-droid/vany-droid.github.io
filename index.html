<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guns.lol Style | Snow Effect</title>
    <style>
        /* Основной темный фон */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #050505;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Скрываем прокрутку для снега */
        }

        /* Холст для снега на весь экран */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* Чтобы снег не мешал нажимать на кнопки */
        }

        /* Контентная карточка (Glassmorphism) */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(45deg, #222, #444);
            margin: 0 auto 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .description {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s ease;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        footer {
            margin-top: 25px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<!-- Холст для анимации -->
<canvas id="snow-canvas"></canvas>

<div class="card">
    <div class="avatar">❄️</div>
    <h1>@yourname</h1>
    <p class="description">Digital enthusiast & Developer</p>

    <div class="links">
        <a href="#" class="link-item">Telegram</a>
        <a href="#" class="link-item">Discord</a>
        <a href="#" class="link-item">GitHub</a>
    </div>

    <footer>
        Est. 2024 • Guns Style
    </footer>
</div>

<script>
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');

    let width, height, snowflakes;

    function init() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        snowflakes = [];
        for (let i = 0; i < 150; i++) {
            snowflakes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 3 + 1, // размер снежинки
                d: Math.random() * 1,     // плотность/скорость
                v: Math.random() * 1 + 0.5 // вертикальная скорость
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.beginPath();
        for (let i = 0; i < snowflakes.length; i++) {
            let p = snowflakes[i];
            ctx.moveTo(p.x, p.y);
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
        }
        ctx.fill();
        update();
    }

    function update() {
        for (let i = 0; i < snowflakes.length; i++) {
            let p = snowflakes[i];
            p.y += p.v;
            p.x += Math.sin(p.y / 50) * 0.5; // легкое покачивание

            if (p.y > height) {
                snowflakes[i] = { x: Math.random() * width, y: -10, r: p.r, d: p.d, v: p.v };
            }
        }
    }

    function animate() {
        draw();
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    init();
    animate();
</script>

</body>
</html>
